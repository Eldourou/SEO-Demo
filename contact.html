      <main>

          <h2>Επικοινωνήστε μαζί μας</h2>

          <p>Διεύθυνση: Κεντρική Πλατεία 10</p>
          <p>Τηλέφωνο: 2100000000</p>
          <p>Email: info@aroma.gr</p>

          <div class="contact-container">
        <h3>Φόρμα επικοινωνίας</h3>

        <form id="contactForm">
        <label for="name">Όνομα:</label>
        <input type="text" id="name" placeholder="Το όνομά σας" required>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="example@mail.com" required>

        <label for="message">Μήνυμα:</label>
        <textarea id="message" placeholder="Γράψτε το μήνυμά σας..." required></textarea>

        <button type="submit">Αποστολή</button>
    </form>

    <div id="responseMessage">
    </div>
</div>

<script src="script.js"></script>
